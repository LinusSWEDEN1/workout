<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Nippard HFFB">
<title>Jeff Nippard – High Frequency Full Body</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap');

  :root {
    --green: #7EC820;
    --green-dim: #5a9116;
    --bg: #0e0f0e;
    --surface: #181a17;
    --surface2: #212420;
    --border: #2a2e29;
    --text: #e8ede6;
    --muted: #7a8276;
    --accent: #7EC820;
    --header-h: 56px;
    --nav-h: 60px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    height: 100%;
    overflow: hidden;
  }

  /* ── HEADER ── */
  #header {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: var(--header-h);
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px;
  }
  #header .logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 16px;
    letter-spacing: .04em;
    line-height: 1.2;
  }
  #header .logo span { color: var(--green); }
  #header .logo .logo-sub { color: var(--muted); font-size: 12px; font-weight: 600; letter-spacing:.03em; }
  #header .week-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: .08em;
    color: var(--muted);
    background: var(--surface2);
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }
  #header .week-badge span { color: var(--green); }

  /* ── MAIN SCROLL AREA ── */
  #app {
    position: fixed;
    top: var(--header-h);
    left: 0; right: 0;
    bottom: var(--nav-h);
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* ── WEEK/DAY SELECTOR ── */
  .selector-bar {
    position: sticky; top: 0; z-index: 50;
    background: var(--bg);
    padding: 10px 0 0;
    border-bottom: 1px solid var(--border);
  }
  .selector-row {
    display: flex;
    overflow-x: auto;
    gap: 6px;
    padding: 0 12px 10px;
    scrollbar-width: none;
  }
  .selector-row::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: .06em;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .chip:active { transform: scale(.95); }
  .chip.active {
    background: var(--green);
    border-color: var(--green);
    color: #000;
  }
  .chip.special { border-color: #4a3a10; color: #c8a040; }
  .chip.special.active { background: #c8a040; border-color: #c8a040; color: #000; }
  .chip.deload { border-color: #1a3a3a; color: #40a0a0; }
  .chip.deload.active { background: #40a0a0; border-color: #40a0a0; color: #000; }

  /* ── DAY NAV ── */
  .day-nav {
    display: flex;
    gap: 6px;
    padding: 10px 12px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .day-nav::-webkit-scrollbar { display: none; }
  .day-chip {
    flex-shrink: 0;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 12px;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    white-space: nowrap;
  }
  .day-chip.active {
    border-color: var(--green);
    color: var(--green);
    background: rgba(126,200,32,.08);
  }
  .day-chip:active { transform: scale(.95); }
  .day-chip.done {
    border-color: var(--green-dim);
    color: var(--green-dim);
    text-decoration: line-through;
    text-decoration-color: var(--green-dim);
  }
  .day-chip.done::after { content: ' ✓'; text-decoration: none; display: inline; }
  .day-chip.active.done {
    border-color: var(--green);
    color: var(--green);
    background: rgba(126,200,32,.08);
  }
  .chip.week-done {
    text-decoration: line-through;
    text-decoration-color: rgba(126,200,32,.5);
    opacity: .7;
  }
  .chip.week-done::after { content: '✓'; margin-left: 4px; text-decoration: none; display: inline; font-size: 10px; }

  /* ── WORKOUT BLOCK ── */
  #workout-content {
    padding: 16px 12px 24px;
  }

  .day-header {
    display: flex; align-items: flex-start; gap: 12px;
    margin-bottom: 16px;
  }
  .day-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 52px;
    line-height: 1;
    color: var(--green);
    flex-shrink: 0;
  }
  .day-info { padding-top: 4px; }
  .day-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 20px;
    letter-spacing: .04em;
    line-height: 1.1;
    color: var(--text);
    text-transform: uppercase;
  }
  .day-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: .06em;
    margin-top: 3px;
    text-transform: uppercase;
  }

  /* ── EXERCISE CARDS ── */
  .exercise-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 10px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .exercise-card.expanded { border-color: var(--green-dim); }

  .ex-main {
    display: flex; align-items: center;
    padding: 12px 14px;
    gap: 12px;
    cursor: pointer;
  }
  .ex-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 22px;
    color: var(--green);
    width: 24px;
    flex-shrink: 0;
    text-align: center;
  }
  .ex-body { flex: 1; min-width: 0; }
  .ex-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 17px;
    letter-spacing: .02em;
    line-height: 1.15;
    color: var(--text);
    text-transform: uppercase;
  }
  .ex-top-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: #c8a040;
    margin-bottom: 2px;
  }
  .ex-pills {
    display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px;
  }
  .pill {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: .06em;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--surface2);
    color: var(--muted);
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .pill.highlight { color: var(--green); border-color: var(--green-dim); background: rgba(126,200,32,.07); }
  .pill.rpe { color: #e07040; border-color: #5a2e1a; background: rgba(224,112,64,.07); }
  .pill.pct { color: #60aadd; border-color: #1a3a5a; background: rgba(96,170,221,.07); }

  .ex-chevron {
    color: var(--border);
    font-size: 18px;
    flex-shrink: 0;
    transition: transform .2s, color .2s;
  }
  .exercise-card.expanded .ex-chevron { transform: rotate(90deg); color: var(--green); }

  .ex-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height .3s ease;
  }
  .exercise-card.expanded .ex-detail { max-height: 700px; }

  .ex-detail-inner {
    padding: 0 14px 14px 50px;
    border-top: 1px solid var(--border);
    padding-top: 10px;
  }
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 10px;
  }
  .detail-item label {
    display: block;
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 2px;
  }
  .detail-item value {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--text);
  }
  .notes-text {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.5;
    border-top: 1px solid var(--border);
    padding-top: 8px;
  }
  .notes-text strong { color: var(--text); font-weight: 600; }

  /* ── BOTTOM NAV ── */
  #bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    height: var(--nav-h);
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; align-items: stretch;
  }
  .nav-btn {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 3px;
    cursor: pointer;
    border: none; background: none; color: var(--muted);
    font-family: 'Barlow', sans-serif;
    transition: color .15s;
  }
  .nav-btn.active { color: var(--green); }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-btn span { font-size: 10px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; }
  .nav-btn:active { opacity: .7; }

  /* ── OVERVIEW VIEW ── */
  #overview-view {
    padding: 16px 12px 24px;
    display: none;
  }
  #overview-view.visible { display: block; }
  #workout-view { display: block; }
  #workout-view.hidden { display: none; }

  .overview-week {
    margin-bottom: 20px;
  }
  .overview-week-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    display: flex; align-items: center; gap: 8px;
  }
  .overview-week-title::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .week-days-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
  }
  .mini-day {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 6px;
    text-align: center;
    cursor: pointer;
    transition: all .15s;
  }
  .mini-day:active { transform: scale(.95); }
  .mini-day .md-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 20px;
    color: var(--green);
  }
  .mini-day .md-focus {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.2;
  }
  .mini-day:hover { border-color: var(--green-dim); }

  /* ── DAY COMPLETE ── */
  .day-complete-btn {
    display: flex; align-items: center; justify-content: center; gap: 10px;
    width: 100%; padding: 16px;
    margin-top: 6px;
    border-radius: 12px;
    border: 2px dashed var(--border);
    background: transparent;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 16px; letter-spacing: .1em;
    text-transform: uppercase;
    cursor: pointer; transition: all .2s;
  }
  .day-complete-btn:active { transform: scale(.97); }
  .day-complete-btn.done {
    border-style: solid;
    border-color: var(--green);
    background: rgba(126,200,32,.08);
    color: var(--green);
  }
  .day-complete-btn .dcb-check {
    width: 28px; height: 28px; border-radius: 50%;
    border: 2px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
    transition: background .2s;
  }
  .day-complete-btn.done .dcb-check {
    background: var(--green); border-color: var(--green); color: #000;
  }

  /* ── MINI-DAY DONE STATE (overview) ── */
  .mini-day.done {
    border-color: var(--green-dim);
    background: rgba(126,200,32,.06);
    position: relative;
  }
  .mini-day.done .md-num { color: var(--green); }
  .mini-day.done .md-focus { color: var(--green-dim); }
  .mini-day.done::after {
    content: '✓';
    position: absolute; top: 3px; right: 5px;
    font-size: 9px; font-weight: 900; color: var(--green);
  }
  .mini-day.done .md-num {
    text-decoration: line-through;
    text-decoration-color: var(--green-dim);
  }

  /* ── WEEK DONE STATE (overview) ── */
  .overview-week-title.week-done {
    color: var(--green);
  }
  .overview-week-title.week-done .week-title-text {
    text-decoration: line-through;
    text-decoration-color: var(--green-dim);
  }
  .overview-week-title .week-done-badge {
    font-size: 11px; font-weight: 700; letter-spacing: .08em;
    color: var(--green); background: rgba(126,200,32,.1);
    border: 1px solid var(--green-dim);
    padding: 2px 8px; border-radius: 20px; white-space: nowrap;
  }

  /* ── GOALS BANNER (overview) ── */
  .goals-banner {
    margin-bottom: 20px;
    border-radius: 12px;
    overflow: hidden;
    border: 1.5px solid #1a2a3a;
    background: linear-gradient(135deg, #090e18 0%, #0e1520 100%);
  }
  .goals-banner-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900; font-size: 11px; letter-spacing: .16em;
    text-transform: uppercase; color: #60aadd;
    padding: 10px 14px 6px;
    border-bottom: 1px solid #1a2a3a;
  }
  .goal-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px;
    border-bottom: 1px solid #1a2a3a;
  }
  .goal-item:last-child { border-bottom: none; }
  .goal-item-icon { font-size: 22px; flex-shrink: 0; }
  .goal-item-body { flex: 1; }
  .goal-item-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 17px; letter-spacing: .02em;
    text-transform: uppercase; color: var(--text); line-height: 1.1;
  }
  .goal-item-target {
    font-size: 12px; color: #60aadd; margin-top: 2px; font-weight: 600;
  }
  .goal-item-timeline {
    font-size: 10px; color: var(--muted); letter-spacing: .06em;
    text-transform: uppercase;
  }

  /* ── SET TRACKER ── */
  .sets-tracker {
    margin-top: 10px;
  }
  .sets-tracker-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .set-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 10px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    margin-bottom: 6px;
    transition: border-color .15s, background .15s;
  }
  .set-row.done {
    border-color: var(--green-dim);
    background: rgba(126,200,32,.06);
  }
  .set-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 14px;
    color: var(--muted);
    width: 28px;
    flex-shrink: 0;
  }
  .set-row.done .set-label { color: var(--green); }
  .weight-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 16px;
    padding: 6px 10px;
    outline: none;
    min-width: 0;
    -webkit-appearance: none;
  }
  .weight-input::placeholder { color: var(--border); }
  .weight-input:focus { border-color: var(--green-dim); }
  .weight-unit {
    font-size: 11px;
    font-weight: 600;
    color: var(--muted);
    flex-shrink: 0;
  }
  .set-check {
    width: 32px; height: 32px;
    border-radius: 8px;
    border: 2px solid var(--border);
    background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: all .15s;
    font-size: 16px;
  }
  .set-check:active { transform: scale(.9); }
  .set-row.done .set-check {
    background: var(--green);
    border-color: var(--green);
    color: #000;
  }
  .ex-progress {
    display: flex;
    gap: 3px;
    margin-top: 4px;
  }
  .progress-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border);
    transition: background .2s;
  }
  .progress-dot.done { background: var(--green); }

  /* ── MOBILITY SECTION ── */
  --gold: #c8a040;
  --gold-dim: #8a6a20;

  .mobility-header {
    display: flex; align-items: center; gap: 10px;
    margin: 6px 0 10px;
  }
  .mobility-header-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 12px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: #c8a040;
    white-space: nowrap;
  }
  .mobility-header-line {
    flex: 1; height: 1px; background: #3a2e10;
  }
  .mobility-header-sub {
    font-size: 10px;
    color: #7a6030;
    letter-spacing: .08em;
    white-space: nowrap;
  }

  .mob-card {
    background: #18160e;
    border: 1.5px solid #3a2e10;
    border-radius: 10px;
    margin-bottom: 8px;
    overflow: hidden;
    transition: border-color .2s;
  }
  .mob-card.expanded { border-color: #c8a040; }

  .mob-main {
    display: flex; align-items: center;
    padding: 11px 14px;
    gap: 12px;
    cursor: pointer;
  }
  .mob-icon {
    font-size: 20px;
    width: 28px;
    text-align: center;
    flex-shrink: 0;
  }
  .mob-body { flex: 1; min-width: 0; }
  .mob-source {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: #8a6a20;
    margin-bottom: 1px;
  }
  .mob-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 16px;
    letter-spacing: .02em;
    color: #e8d898;
    text-transform: uppercase;
    line-height: 1.15;
  }
  .mob-pills {
    display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px;
  }
  .mob-pill {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: .06em;
    padding: 3px 8px;
    border-radius: 4px;
    background: #1e1a08;
    color: #8a7040;
    border: 1px solid #3a2e10;
    white-space: nowrap;
  }
  .mob-pill.gold { color: #c8a040; border-color: #5a4010; background: rgba(200,160,64,.08); }
  .mob-chevron {
    color: #3a2e10;
    font-size: 18px;
    flex-shrink: 0;
    transition: transform .2s, color .2s;
  }
  .mob-card.expanded .mob-chevron { transform: rotate(90deg); color: #c8a040; }

  .mob-detail {
    max-height: 0;
    overflow: hidden;
    transition: max-height .35s ease;
  }
  .mob-card.expanded .mob-detail { max-height: 400px; }
  .mob-detail-inner {
    padding: 10px 14px 14px 54px;
    border-top: 1px solid #2a2208;
  }
  .mob-how {
    font-size: 13px;
    color: #a09060;
    line-height: 1.6;
    margin-bottom: 8px;
  }
  .mob-how strong { color: #e8d898; font-weight: 600; }
  .mob-tags {
    display: flex; gap: 5px; flex-wrap: wrap;
  }
  .mob-tag {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 2px 8px;
    border-radius: 20px;
    border: 1px solid #3a2e10;
    color: #7a6030;
  }
  .mob-tag.morning { color: #d4a030; border-color: #5a4010; }
  .mob-tag.warmup { color: #60a080; border-color: #1a4030; }
  .mob-tag.yoga { color: #a060c0; border-color: #3a1a50; }
  .mob-tag.atg { color: #c84040; border-color: #5a1010; }

  .section-divider {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 900;
    font-size: 11px;
    letter-spacing: .16em;
    text-transform: uppercase;
    color: var(--green);
    display: flex; align-items: center; gap: 8px;
    margin: 16px 0 10px;
  }
  .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── DAY SECTION BLOCKS ── */
  .day-section {
    border-radius: 12px;
    border: 1.5px solid;
    margin-bottom: 14px;
    overflow: hidden;
  }

// ── 1RM CALCULATOR (Epley formula) ──
function calc1RM(weight, reps) {
  if (!weight || !reps) return 0;
  if (reps === 1) return weight;
  return Math.round(weight * (1 + reps / 30));
}

// ── PR STORAGE ──
function prKey(exName) { return `nf_pr_${exName.replace(/\s+/g,'_').toLowerCase()}`; }
function loadPR(exName) {
  try { const v = localStorage.getItem(prKey(exName)); return v ? JSON.parse(v) : null; } catch(e) { return null; }
}
function savePR(exName, orm, weight, reps, date) {
  try { localStorage.setItem(prKey(exName), JSON.stringify({orm, weight, reps, date})); } catch(e) {}
}
function checkAndSavePR(exName, weight, reps) {
  const w = parseFloat(weight); const r = parseInt(reps);
  if (!w || !r) return false;
  const orm = calc1RM(w, r);
  const existing = loadPR(exName);
  if (!existing || orm > existing.orm) {
    savePR(exName, orm, w, r, new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short'}));
    return true;
  }
  return false;
}

// ── RUN RECORDS STORAGE ──
const RUN_DISTANCES = [
  { key:'5k', label:'5K', meters:5000 },
  { key:'10k', label:'10K', meters:10000 },
  { key:'hm', label:'Half Marathon', meters:21097 },
  { key:'marathon', label:'Marathon', meters:42195 },
];
function runRecKey(dist) { return `nf_runrec_${dist}`; }
function loadRunRec(dist) {
  try { const v = localStorage.getItem(runRecKey(dist)); return v ? JSON.parse(v) : null; } catch(e) { return null; }
}
function saveRunRec(dist, timeStr, date) {
  try {
    const secs = parseTimeToSecs(timeStr);
    if (!secs) return false;
    const existing = loadRunRec(dist);
    if (!existing || secs < existing.secs) {
      const meters = RUN_DISTANCES.find(d=>d.key===dist)?.meters || 0;
      const pace = meters ? secsToTime(Math.round(secs / (meters/1000))) : '';
      localStorage.setItem(runRecKey(dist), JSON.stringify({time:timeStr, secs, pace, date}));
      return true; // new record
    }
    return false;
  } catch(e) { return false; }
}
function parseTimeToSecs(str) {
  if (!str) return 0;
  str = str.trim();
  const parts = str.split(':').map(Number);
  if (parts.some(isNaN)) return 0;
  if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
  if (parts.length === 2) return parts[0]*60 + parts[1];
  return parts[0];
}
function secsToTime(s) {
  const m = Math.floor(s/60), sec = s%60;
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function loadNotes(week, day) { try { return localStorage.getItem(notesKey(week,day)) || ''; } catch(e) { return ''; } }
function saveNotes(week, day, text) { try { localStorage.setItem(notesKey(week,day), text); } catch(e) {} }

function getLastWeight(exName) {
  // search backwards through all weeks/days for most recent non-empty weight logged for this exercise
  for (let w = currentWeek; w >= 1; w--) {
    const startDay = (w === currentWeek) ? currentDay - 1 : 5;
    for (let d = startDay; d >= 1; d--) {
      const prog = PROGRAM[w]?.[d];
      if (!prog) continue;
      const exIdx = prog.exercises.findIndex(e => e.name === exName);
      if (exIdx === -1) continue;
      const ex = prog.exercises[exIdx];
      for (let s = 0; s < ex.sets; s++) {
        const saved = loadSet(w, d, exIdx, s);
        if (saved.weight) return { weight: saved.weight, week: w, day: d };
      }
    }
  }
  return null;
}

// ── SWIPE BETWEEN DAYS ──
let touchStartX = 0, touchStartY = 0;
let swipeInited = false;
function initSwipe() {
  if (swipeInited) return; // only ever attach once
  swipeInited = true;
  const el = document.getElementById('app');
  if (!el) return;
  el.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });
  el.addEventListener('touchend', e => {
    if (currentView !== 'workout') return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > 55 && Math.abs(dx) > Math.abs(dy) * 1.8) {
      if (dx < 0 && currentDay < 5) selectDay(currentDay + 1);  // swipe left → next day
      else if (dx > 0 && currentDay > 1) selectDay(currentDay - 1); // swipe right → prev day
    }
  }, { passive: true });
}

let currentWeek = 1;
let currentDay = 1;
let currentView = 'workout';

function getWeekColor(type) {
  if (type === 'deload') return 'deload';
  if (type === 'special') return 'special';
  return '';
}

function buildWeekChips() {
  const el = document.getElementById('week-chips');
  el.innerHTML = WEEKS.map((w,i) => {
    const wn = i+1;
    const cls = getWeekColor(w.type);
    const wkDone = isWeekDone(wn);
    const label = w.subtitle ? `${w.label}<span style="font-size:9px;margin-left:3px;opacity:.7">${w.subtitle.replace('BLOCK ','B').replace('DELOAD','DL').replace('AMRAPS','AMR')}</span>` : w.label;
    return `<div class="chip ${cls} ${wn===currentWeek?'active':''} ${wkDone?'week-done':''}" onclick="selectWeek(${wn})">${label}</div>`;
  }).join('');
}

function buildDayChips() {
  const el = document.getElementById('day-chips');
  const dayLabels = ['Lower', 'Chest', 'Back', 'Lower 2', 'Delts'];
  el.innerHTML = dayLabels.map((d,i) => {
    const dn = i+1;
    const dayDone = isDayDone(currentWeek, dn);
    return `<div class="day-chip ${dn===currentDay?'active':''} ${dayDone?'done':''}" onclick="selectDay(${dn})">D${dn} · ${d}</div>`;
  }).join('');
}

function selectWeek(w) {
  currentWeek = w;
  buildWeekChips();
  renderWorkout();
  updateBadge();
  document.getElementById('app').scrollTop = 0;
}

function selectDay(d) {
  currentDay = d;
  buildDayChips();
  renderWorkout();
  updateBadge();
  document.getElementById('app').scrollTop = 0;
}

function updateBadge() {
  document.getElementById('badge-week').textContent = currentWeek;
  document.getElementById('badge-day').textContent = currentDay;
}

function isRPE(str) { return str && str.toUpperCase().includes('RPE'); }
function isPct(str) { return str && str.includes('%'); }

// ── STORAGE HELPERS ──
function storageKey(week, day, exIdx, setIdx) {
  return `nf_w${week}_d${day}_e${exIdx}_s${setIdx}`;
}
function saveSet(week, day, exIdx, setIdx, weight, done) {
  try { localStorage.setItem(storageKey(week,day,exIdx,setIdx), JSON.stringify({weight,done})); } catch(e){}
}
function loadSet(week, day, exIdx, setIdx) {
  try {
    const v = localStorage.getItem(storageKey(week,day,exIdx,setIdx));
    return v ? JSON.parse(v) : {weight:'', done:false};
  } catch(e) { return {weight:'', done:false}; }
}

function dayCompleteKey(week, day) { return `nf_daydone_w${week}_d${day}`; }
function isDayDone(week, day) {
  try { return localStorage.getItem(dayCompleteKey(week,day)) === '1'; } catch(e) { return false; }
}
function setDayDone(week, day, done) {
  try { done ? localStorage.setItem(dayCompleteKey(week,day),'1') : localStorage.removeItem(dayCompleteKey(week,day)); } catch(e) {}
}
function isWeekDone(week) {
  for (let d=1; d<=5; d++) { if (!isDayDone(week,d)) return false; }
  return true;
}

function secDoneKey(week, day, sec) { return `nf_sec_${sec}_w${week}_d${day}`; }
function isSecDone(week, day, sec) {
  try { return localStorage.getItem(secDoneKey(week,day,sec)) === '1'; } catch(e) { return false; }
}
function setSecDone(week, day, sec, done) {
  try { done ? localStorage.setItem(secDoneKey(week,day,sec),'1') : localStorage.removeItem(secDoneKey(week,day,sec)); } catch(e) {}
}
function toggleSecDone(sec, event) {
  event.stopPropagation(); // don't collapse the section
  const nowDone = !isSecDone(currentWeek, currentDay, sec);
  setSecDone(currentWeek, currentDay, sec, nowDone);
  // update tick button
  const tick = document.getElementById(`sec-tick-${sec}`);
  const header = document.getElementById(`sec-header-${sec}`);
  if (tick) { tick.textContent = nowDone ? '✓' : ''; tick.classList.toggle('ticked', nowDone); }
  if (header) header.classList.toggle('sec-done', nowDone);
  // if all 3 sections done, auto-mark day complete
  const allDone = isSecDone(currentWeek,currentDay,'morning') && isSecDone(currentWeek,currentDay,'gym') && isSecDone(currentWeek,currentDay,'run');
  if (allDone && !isDayDone(currentWeek, currentDay)) {
    setDayDone(currentWeek, currentDay, true);
    const btn = document.getElementById('day-complete-btn');
    if (btn) { btn.classList.add('done'); btn.querySelector('.dcb-label').textContent='Day Complete!'; btn.querySelector('.dcb-check').textContent='✓'; }
    buildDayChips(); buildWeekChips();
    if (currentView==='overview') buildOverview();
  }
}

function toggleDayComplete() {
  const nowDone = !isDayDone(currentWeek, currentDay);
  setDayDone(currentWeek, currentDay, nowDone);
  // update the complete button in place
  const btn = document.getElementById('day-complete-btn');
  if (btn) {
    btn.classList.toggle('done', nowDone);
    btn.querySelector('.dcb-label').textContent = nowDone ? 'Day Complete!' : 'Mark Day Complete';
    btn.querySelector('.dcb-check').textContent = nowDone ? '✓' : '';
  }
  // refresh chips so strikethrough appears immediately
  buildDayChips();
  buildWeekChips();
  // if overview is visible, refresh it too
  if (currentView === 'overview') buildOverview();
}

function renderWorkout() {
  const data = PROGRAM[currentWeek][currentDay];
  const weekInfo = WEEKS[currentWeek-1];
  const focusLines = data.focus.split('\n');

  // ── Day header ──
  let html = `
    <div class="day-header">
      <div class="day-label">D${currentDay}</div>
      <div class="day-info">
        <div class="day-sub">${weekInfo.name}${weekInfo.subtitle ? ' · ' + weekInfo.subtitle : ''}</div>
        <div class="day-title">${focusLines[0]}</div>
        <div class="day-sub">${focusLines[1] || ''}</div>
      </div>
    </div>
  `;

  // ── SECTION 1: Morning Routine ──
  const mobExercises = MOBILITY[currentDay];
  const tagLabels = { atg:'ATG', morning:'Morning', warmup:'Warmup', yoga:'Yoga' };
  let mobCardsHtml = '';
  mobExercises.forEach((ex, i) => {
    const tagHtml = ex.tags.map(t=>`<span class="mob-tag ${t}">${tagLabels[t]||t}</span>`).join('');
    mobCardsHtml += `
      <div class="mob-card" id="mob-${i}">
        <div class="mob-main" onclick="toggleMob(${i})">
          <div class="mob-icon">${ex.icon}</div>
          <div class="mob-body">
            <div class="mob-source">${ex.source}</div>
            <div class="mob-name">${ex.name}</div>
            <div class="mob-pills"><div class="mob-pill gold">${ex.duration}</div></div>
          </div>
          <div class="mob-chevron">›</div>
        </div>
        <div class="mob-detail">
          <div class="mob-detail-inner">
            <div class="mob-how">${ex.how}</div>
            <div class="mob-tags">${tagHtml}</div>
          </div>
        </div>
      </div>`;
  });

  const morningDone = isSecDone(currentWeek, currentDay, 'morning');
  html += `
    <div class="day-section morning open" id="section-morning">
      <div class="section-header${morningDone?' sec-done':''}" id="sec-header-morning" onclick="toggleSection('morning')">
        <div class="section-header-icon">🌅</div>
        <div class="section-header-body">
          <div class="section-header-label">Morning Routine</div>
          <div class="section-header-sub">Do at home before leaving — 10–15 min</div>
        </div>
        <div class="sec-tick${morningDone?' ticked':''}" id="sec-tick-morning" onclick="toggleSecDone('morning',event)">${morningDone?'✓':''}</div>
        <div class="section-header-chevron">›</div>
      </div>
      <div class="section-body">${mobCardsHtml}</div>
    </div>`;

  // ── SECTION 2: Gym ──
  let gymHtml = '';
  data.exercises.forEach((ex, i) => {
    const intensityClass = isRPE(ex.intensity) ? 'rpe' : isPct(ex.intensity) ? 'pct' : 'highlight';
    const tagHtml = ex.tag ? `<div class="ex-top-tag">${ex.tag}</div>` : '';
    const setCount = ex.sets;
    const savedSets = [];
    for (let s=0; s<setCount; s++) savedSets.push(loadSet(currentWeek,currentDay,i,s));
    const doneSets = savedSets.filter(s=>s.done).length;
    const dotsHtml = setCount > 0 ? `<div class="ex-progress">${Array.from({length:setCount},(_,s)=>`<div class="progress-dot${savedSets[s].done?' done':''}"></div>`).join('')}</div>` : '';

    // last session weight
    const lastW = getLastWeight(ex.name);
    const lastHint = lastW ? `<div class="last-weight-hint">Last: ${lastW.weight}kg (W${lastW.week}D${lastW.day})</div>` : '';

    // current PR for badge check
    const pr = loadPR(ex.name);

    let setRowsHtml = '';
    for (let s=0; s<setCount; s++) {
      const sv = savedSets[s];
      const thisOrm = sv.weight && ex.reps ? calc1RM(parseFloat(sv.weight), parseInt(ex.reps)) : 0;
      const isPR = thisOrm > 0 && pr && thisOrm >= pr.orm;
      setRowsHtml += `
        <div class="set-row${sv.done?' done':''}" id="setrow-${i}-${s}">
          <div class="set-label">S${s+1}</div>
          <input class="weight-input" type="number" inputmode="decimal" placeholder="${lastW?lastW.weight+'kg':'kg'}"
            id="weight-${i}-${s}" value="${sv.weight}"
            onchange="handleWeightChange(${i},${s},this.value)"
            onclick="this.select()">
          <span class="weight-unit">kg</span>
          <span class="pr-badge${isPR?' visible':''}">PR</span>
          <div class="set-check" id="check-${i}-${s}" onclick="toggleSet(${i},${s})">${sv.done?'✓':''}</div>
        </div>`;
    }
    gymHtml += `
      <div class="exercise-card${doneSets===setCount&&setCount>0?' expanded':''}" id="ex-${i}">
        <div class="ex-main" onclick="toggleEx(${i})">
          <div class="ex-num">${i+1}</div>
          <div class="ex-body">
            ${tagHtml}
            <div class="ex-name">${ex.name}</div>
            <div class="ex-pills">
              <div class="pill highlight">${ex.sets}×${ex.reps}</div>
              <div class="pill ${intensityClass}">${ex.intensity}</div>
              <div class="pill">⏱ ${ex.rest}</div>
              ${ex.warmup > 0 ? `<div class="pill">${ex.warmup} warm</div>` : ''}
            </div>
            ${dotsHtml}
          </div>
          <div class="ex-chevron">›</div>
        </div>
        <div class="ex-detail">
          <div class="ex-detail-inner">
            <div class="detail-grid">
              <div class="detail-item"><label>Working Sets</label><value>${ex.sets}</value></div>
              <div class="detail-item"><label>Reps</label><value>${ex.reps}</value></div>
              <div class="detail-item"><label>Intensity</label><value>${ex.intensity}</value></div>
              <div class="detail-item"><label>Rest</label><value>${ex.rest}</value></div>
            </div>
            <div class="notes-text"><strong>Form:</strong> ${ex.notes}</div>
            <div class="sets-tracker">
              <div class="sets-tracker-title">Track Sets — tap ✓ when done</div>
              ${lastHint}
              ${setRowsHtml}
            </div>
          </div>
        </div>
      </div>`;
  });

  const gymDone = isSecDone(currentWeek, currentDay, 'gym');
  html += `
    <div class="day-section gym open" id="section-gym">
      <div class="section-header${gymDone?' sec-done':''}" id="sec-header-gym" onclick="toggleSection('gym')">
        <div class="section-header-icon">🏋️</div>
        <div class="section-header-body">
          <div class="section-header-label">Gym — ${focusLines[0]}</div>
          <div class="section-header-sub">${data.exercises.length} exercises · track weights below</div>
        </div>
        <div class="sec-tick${gymDone?' ticked':''}" id="sec-tick-gym" onclick="toggleSecDone('gym',event)">${gymDone?'✓':''}</div>
        <div class="section-header-chevron">›</div>
      </div>
      <div class="section-body">${gymHtml}</div>
    </div>`;

  // ── SECTION 3: Run ──
  const runDay = DAY_RUNS[currentDay];
  const runSecDone = isSecDone(currentWeek, currentDay, 'run');
  html += `
    <div class="day-section run open" id="section-run">
      <div class="section-header${runSecDone?' sec-done':''}" id="sec-header-run" onclick="toggleSection('run')">
        <div class="section-header-icon">${runDay.icon}</div>
        <div class="section-header-body">
          <div class="section-header-label">Running — ${runDay.label}</div>
          <div class="section-header-sub">${runDay.pills[0].text}</div>
        </div>
        <div class="sec-tick${runSecDone?' ticked':''}" id="sec-tick-run" onclick="toggleSecDone('run',event)">${runSecDone?'✓':''}</div>
        <div class="section-header-chevron">›</div>
      </div>
      <div class="section-body">${renderDayRun(currentDay)}</div>
    </div>`;

  // ── NOTES FIELD ──
  const savedNotes = loadNotes(currentWeek, currentDay);
  html += `
    <div class="day-notes-wrap">
      <div class="day-notes-label">📝 Day Notes</div>
      <textarea class="day-notes-input" id="day-notes" placeholder="How did today feel? Any PRs, soreness, energy level…"
        onchange="saveNotes(currentWeek, currentDay, this.value)"
        oninput="saveNotes(currentWeek, currentDay, this.value)">${savedNotes}</textarea>
    </div>`;

  // ── SWIPE DOTS ──
  html += `<div class="swipe-hint">${[1,2,3,4,5].map(d=>`<div class="swipe-dot${d===currentDay?' active':''}"></div>`).join('')}</div>`;

  // ── DAY COMPLETE BUTTON ──
  const dayDone = isDayDone(currentWeek, currentDay);
  html += `
    <button class="day-complete-btn${dayDone?' done':''}" id="day-complete-btn" onclick="toggleDayComplete()">
      <div class="dcb-check">${dayDone?'✓':''}</div>
      <span class="dcb-label">${dayDone?'Day Complete!':'Mark Day Complete'}</span>
    </button>`;

  document.getElementById('workout-content').innerHTML = html;
}

function toggleSection(id) {
  const el = document.getElementById('section-' + id);
  if (el) el.classList.toggle('open');
}

function toggleEx(i) {
  const card = document.getElementById('ex-'+i);
  card.classList.toggle('expanded');
}

function handleWeightChange(exIdx, setIdx, val) {
  const sv = loadSet(currentWeek, currentDay, exIdx, setIdx);
  saveSet(currentWeek, currentDay, exIdx, setIdx, val, sv.done);
}

function toggleSet(exIdx, setIdx) {
  const sv = loadSet(currentWeek, currentDay, exIdx, setIdx);
  const weightEl = document.getElementById(`weight-${exIdx}-${setIdx}`);
  const newDone = !sv.done;
  const newWeight = weightEl ? weightEl.value : sv.weight;
  saveSet(currentWeek, currentDay, exIdx, setIdx, newWeight, newDone);

  // check PR when marking done
  if (newDone && newWeight) {
    const ex = PROGRAM[currentWeek][currentDay].exercises[exIdx];
    const repsNum = parseInt(ex.reps);
    if (repsNum && !isNaN(repsNum)) {
      const isPR = checkAndSavePR(ex.name, newWeight, repsNum);
      const badge = document.getElementById(`weight-${exIdx}-${setIdx}`)?.parentElement?.querySelector('.pr-badge');
      if (badge && isPR) { badge.classList.add('visible'); }
    }
  }

  // update UI without full re-render
  const row = document.getElementById(`setrow-${exIdx}-${setIdx}`);
  const check = document.getElementById(`check-${exIdx}-${setIdx}`);
  if (row) row.classList.toggle('done', newDone);
  if (check) check.textContent = newDone ? '✓' : '';

  // update progress dots
  const ex = PROGRAM[currentWeek][currentDay].exercises[exIdx];
  const setCount = ex.sets;
  const dots = document.querySelectorAll(`#ex-${exIdx} .progress-dot`);
  for (let s=0; s<setCount; s++) {
    const saved = loadSet(currentWeek, currentDay, exIdx, s);
    if (dots[s]) dots[s].classList.toggle('done', saved.done);
  }
}

function buildOverview() {
  const focusAbbr = ['LWR','CHT','BCK','LWR2','DLT'];
  const focusFull = ['Lower','Chest','Back','Lower 2','Delts'];

  // Goals banner
  let html = `
    <div class="goals-banner">
      <div class="goals-banner-title">🎯 Your Goals</div>
      <div class="goal-item">
        <div class="goal-item-icon">⚡</div>
        <div class="goal-item-body">
          <div class="goal-item-name">5k Sub-18 Minutes</div>
          <div class="goal-item-target">Target: 17:59 · Pace: 3:36/km</div>
          <div class="goal-item-timeline">End of summer · 3:36/km pace · Intervals on D2</div>
        </div>
      </div>
      <div class="goal-item">
        <div class="goal-item-icon">🏅</div>
        <div class="goal-item-body">
          <div class="goal-item-name">Half Marathon 1:40</div>
          <div class="goal-item-target">Target: 1:40:00 · Pace: 4:44/km</div>
          <div class="goal-item-timeline">~1 year · Long runs on D5</div>
        </div>
      </div>
    </div>`;

  WEEKS.forEach((wk, wi) => {
    const wn = wi+1;
    const weekDone = isWeekDone(wn);
    const titleClass = weekDone ? 'overview-week-title week-done' : 'overview-week-title';
    const titleText = `${wk.name}${wk.subtitle ? ' · '+wk.subtitle : ''}`;
    const badge = weekDone ? `<span class="week-done-badge">✓ DONE</span>` : '';

    html += `<div class="overview-week">
      <div class="${titleClass}">
        <span class="week-title-text">${titleText}</span>
        ${badge}
      </div>
      <div class="week-days-grid">`;

    for (let d=1; d<=5; d++) {
      const dayDone = isDayDone(wn, d);
      html += `<div class="mini-day${dayDone?' done':''}" onclick="goToDay(${wn},${d})">
        <div class="md-num">D${d}</div>
        <div class="md-focus">${focusAbbr[d-1]}</div>
      </div>`;
    }
    html += `</div></div>`;
  });

  document.getElementById('overview-content').innerHTML = html;
}

function goToDay(w, d) {
  currentWeek = w;
  currentDay = d;
  showView('workout');
  buildWeekChips();
  buildDayChips();
  renderWorkout();
  updateBadge();
  document.getElementById('app').scrollTop = 0;
}

function showView(view) {
  currentView = view;
  document.getElementById('workout-view').classList.toggle('hidden', view !== 'workout');
  document.getElementById('overview-view').classList.toggle('visible', view === 'overview');
  document.getElementById('records-view').classList.toggle('visible', view === 'records');
  document.getElementById('nav-workout').classList.toggle('active', view === 'workout');
  document.getElementById('nav-overview').classList.toggle('active', view === 'overview');
  document.getElementById('nav-records').classList.toggle('active', view === 'records');
  if (view === 'overview') buildOverview();
  if (view === 'records') buildRecords();
  document.getElementById('app').scrollTop = 0;
}

// Init
buildWeekChips();
buildDayChips();
renderWorkout();
buildOverview();
buildRecords();
updateBadge();
setTimeout(initSwipe, 100);

// Scroll selected week chip into view
setTimeout(() => {
  const activeChip = document.querySelector('.chip.active');
  if (activeChip) activeChip.scrollIntoView({ inline: 'center', behavior: 'smooth', block: 'nearest' });
}, 100);
</script>
